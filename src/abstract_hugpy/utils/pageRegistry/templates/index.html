<!-- templates/index.html -->
<!doctype html>
<title>Utilities</title>
<h1>Utilities</h1>
{% for category, pages in grouped.items() %}
  <h2>{{ category }}</h2>
  <ul>
  {% for p in pages %}
    <li><a href="{{ url_for('pages_bp.page', key=p.key) }}">{{ p.title }}</a>
      {% if p.description %} — {{ p.description }}{% endif %}</li>
  {% endfor %}
  </ul>
{% endfor %}
