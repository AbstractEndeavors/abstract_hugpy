<!-- templates/page.html -->
<!doctype html>
<title>{{ spec.title }}</title>
<h1>{{ spec.title }}</h1>
{% if spec.description %}<p>{{ spec.description }}</p>{% endif %}

<form id="run" action="{{ spec.endpoint }}" method="{{ spec.method }}"
      {% if spec.is_upload %}enctype="multipart/form-data"{% endif %}>
  {% for f in spec.fields %}
    <p><label>{{ f.label }}{% if f.required %} *{% endif %}<br>
    {% if f.kind == "textarea" %}
      <textarea name="{{ f.name }}" rows="6" cols="60"
        {% if f.required %}required{% endif %}>{{ f.default or "" }}</textarea>
    {% elif f.kind == "select" %}
      <select name="{{ f.name }}">
        {% for c in f.choices %}
          <option value="{{ c }}" {% if c == f.default %}selected{% endif %}>{{ c }}</option>
        {% endfor %}
      </select>
    {% elif f.kind == "checkbox" %}
      <input type="checkbox" name="{{ f.name }}" {% if f.default %}checked{% endif %}>
    {% elif f.kind == "number" %}
      <input type="number" name="{{ f.name }}"
        value="{{ f.default if f.default is not none else '' }}">
    {% elif f.kind == "file" %}
      <input type="file" name="{{ f.name }}" {% if f.required %}required{% endif %}>
    {% elif f.kind == "files" %}
      <input type="file" name="files" multiple {% if f.required %}required{% endif %}>
    {% else %}
      <input type="text" name="{{ f.name }}" value="{{ f.default or '' }}"
        {% if f.required %}required{% endif %}>
    {% endif %}
    </label>{% if f.help %} <small>{{ f.help }}</small>{% endif %}</p>
  {% endfor %}
  <button type="submit">{{ spec.submit_label }}</button>
</form>

<h3>Result</h3>
<pre id="result">(none)</pre>

<script>
// Configuration for polling
const POLL_INTERVAL = 2000; // 2 seconds
const JOBS_PREFIX = "/hugpy_bp/jobs"; // Adjust based on your blueprint mounting

document.getElementById("run").addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.target;
  const result = document.getElementById("result");
  const isQueued = {{ 'true' if spec.queued else 'false' }};
  
  result.textContent = "initializing...";

  // 1. Prepare Data
  let body, headers = {};
  if (form.enctype === "multipart/form-data") {
    body = new FormData(form);
  } else {
    const obj = {};
    for (const [k, v] of new FormData(form).entries()) obj[k] = v;
    body = JSON.stringify(obj);
    headers["Content-Type"] = "application/json";
  }

  try {
    // 2. Submit Request
    let targetUrl = form.action;
    
    // If queued, we hit the jobs endpoint instead, passing the original endpoint as a param
    if (isQueued) {
      targetUrl = `${JOBS_PREFIX}?target=${encodeURIComponent(form.action)}`;
    }

    const response = await fetch(targetUrl, { method: form.method, body, headers });
    const initialData = await response.json();

    if (!isQueued) {
      result.textContent = JSON.stringify(initialData, null, 2);
      return;
    }

    // 3. Polling Logic
    const jobId = initialData.job_id;
    if (!jobId) throw new Error("No Job ID returned from queue");

    let completed = false;
    while (!completed) {
      result.textContent = `Queued... Job ID: ${jobId}\nChecking status...`;
      
      const pollReq = await fetch(`${JOBS_PREFIX}/${jobId}`);
      const statusData = await pollReq.json();

      if (statusData.status === "completed") {
        result.textContent = JSON.stringify(statusData.result, null, 2);
        completed = true;
      } else if (statusData.status === "failed") {
        result.textContent = "Job Failed: " + JSON.stringify(statusData.error, null, 2);
        completed = true;
      } else {
        // Still processing or in queue
        result.textContent = `Processing... Status: ${statusData.status}\nLast updated: ${new Date().toLocaleTimeString()}`;
        await new Promise(r => setTimeout(r, POLL_INTERVAL));
      }
    }

  } catch (err) {
    result.textContent = "error: " + err;
  }
});
</script>
